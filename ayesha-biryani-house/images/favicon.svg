<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg" width="200" height="240">
  <!-- Outer arch frame (white) -->
  <path d="M 40 60 Q 40 30 70 30 L 130 30 Q 160 30 160 60 L 160 140 Q 160 160 140 170 L 60 170 Q 40 160 40 140 Z" fill="none" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Background (transparent) -->
  <path d="M 50 55 Q 50 35 75 35 L 125 35 Q 150 35 150 55 L 150 140 Q 150 158 132 166 L 68 166 Q 50 158 50 140 Z" fill="none"/>

  <!-- Orange flame -->
  <g transform="translate(100, 55)">
    <path d="M 0 -15 Q -8 -5 -6 5 Q -4 12 0 14 Q 4 12 6 5 Q 8 -5 0 -15 Z" fill="#FF9800"/>
    <path d="M -4 -8 Q -7 -2 -5 4 Q -3 8 -1 8 Q -3 5 -4 -8 Z" fill="#FFB74D"/>
    <path d="M 4 -8 Q 7 -2 5 4 Q 3 8 1 8 Q 3 5 4 -8 Z" fill="#FFB74D"/>
  </g>

  <!-- Rooster silhouette (white) -->
  <g transform="translate(100, 95)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="18" ry="22" fill="#FFFFFF"/>
    <!-- Neck -->
    <rect x="-8" y="-20" width="16" height="18" fill="#FFFFFF"/>
    <!-- Head -->
    <circle cx="0" cy="-32" r="10" fill="#FFFFFF"/>
    <!-- Comb -->
    <path d="M -6 -38 Q -8 -45 -4 -48 Q 0 -50 4 -48 Q 8 -45 6 -38" fill="#FFFFFF"/>
    <!-- Beak -->
    <polygon points="8,-32 16,-31 10,-28" fill="#FFFFFF"/>
    <!-- Eye -->
    <circle cx="3" cy="-34" r="2.5" fill="#FF9800"/>
    <!-- Tail feathers -->
    <path d="M -15 -5 Q -28 -15 -25 -5" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M -16 0 Q -30 -8 -26 0" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M -15 5 Q -28 -2 -24 5" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Legs -->
    <rect x="-5" y="18" width="2" height="12" fill="#FFFFFF"/>
    <rect x="3" y="18" width="2" height="12" fill="#FFFFFF"/>
  </g>
</svg>